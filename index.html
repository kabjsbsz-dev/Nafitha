<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نافذة</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>

<script>
setTimeout(function(){

firebase.auth().onAuthStateChanged(function(user){

if(user){

window.location.replace("home.html");

}else{

window.location.replace("login.html");

}

});

},1000);
</script>

</head>

<body class="welcome">

<div class="welcome-box">

<div class="logo-circle">
<img src="./images/logo.png" alt="نافذة">
</div>

<h1>نافذة</h1>

<p>
منصة تجمع أصحاب معامل الألمنيوم والـPVC والزبائن في مكان واحد
</p>

<button class="mainBtn" onclick="window.location='login.html'">
تسجيل الدخول
</button>

<button class="secBtn" onclick="window.location='register.html'">
إنشاء حساب
</button>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}

firebase.auth().onAuthStateChanged(function(user){
    if(user){
        window.location.replace("home.html");
    }
});
</script>
</body>

</html>
