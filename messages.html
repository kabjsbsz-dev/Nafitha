<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثات - نافذة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <style>
        .chat-list {
            padding: 10px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #fff;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .chat-item:hover {
            background: #f0f2f5;
            transform: translateX(-4px);
        }
        .chat-item img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFD700;
        }
        .chat-item .chat-info {
            flex: 1;
        }
        .chat-item .chat-name {
            font-weight: bold;
            color: #111;
        }
        .chat-item .chat-last {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }
        .chat-item .chat-time {
            font-size: 11px;
            color: #aaa;
        }
        .chat-empty {
            text-align: center;
            color: #888;
            padding: 50px 20px;
        }
        .chat-empty span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="logo">💬 المحادثات</div>
        <div class="top-right">
            <button onclick="window.location='home.html'">🏠</button>
        </div>
    </header>

    <div class="chat-list" id="chatList">
        <div class="chat-empty">
            <span>💬</span>
            جاري التحميل...
        </div>
    </div>

    <script src="messages.js"></script>
</body>
</html>
