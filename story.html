```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القصص</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
</head>

<body>
    <header class="topbar">
        <div class="logo">📸 القصص</div>
        <div class="top-right">
            <button onclick="toggleDarkMode()">🌙</button>
            <button onclick="window.location='home.html'">🏠</button>
        </div>
    </header>

    <div style="padding:14px;">
        <div class="post">
            <div class="post-body" style="text-align:center;padding:30px;">
                <div style="font-size:48px;">📸</div>
                <p style="color:#888;font-size:16px;">قريباً... نظام القصص (Stories)</p>
                <p style="color:#aaa;font-size:14px;">ستظهر قصص المستخدمين هنا وتختفي بعد 24 ساعة</p>
                <button onclick="addSampleStory()" style="padding:12px 24px;background:#FFD700;border-radius:12px;font-weight:bold;margin-top:12px;">➕ إضافة قصة تجريبية</button>
            </div>
        </div>
        <div id="storiesList"></div>
    </div>

    <script>
        auth.onAuthStateChanged(function(user) {
            if (!user) { window.location = "login.html"; return; }
            loadActiveStories();
        });

        function loadActiveStories() {
            let now = Date.now();
            db.collection("stories")
                .where("expires", ">", now)
                .orderBy("time", "desc")
                .get()
                .then(function(snapshot) {
                    let html = "";
                    snapshot.forEach(function(doc) {
                        let s = doc.data();
                        html += `
                        <div class="post">
                            <div class="post-body" style="text-align:center;">
                                <img src="${s.image}" style="width:100%;max-height:400px;object-fit:cover;border-radius:12px;">
                                <p style="margin-top:8px;">📸 ${s.owner || 'مستخدم'}</p>
                            </div>
                        </div>
                        `;
                    });
                    document.getElementById("storiesList").innerHTML = html;
                });
        }

        function addSampleStory() {
            if (!auth.currentUser) return;
            let uid = auth.currentUser.uid;

            db.collection("users").doc(uid).get().then(function(doc) {
                let data = doc.data() || {};
                let image = data.image || "images/logo.png";

                db.collection("stories").add({
                    uid: uid,
                    owner: data.name || "مستخدم",
                    image: image,
                    time: Date.now(),
                    expires: Date.now() + (24 * 60 * 60 * 1000)
                }).then(function() {
                    alert("✅ تم إضافة القصة");
                    loadActiveStories();
                });
            });
        }
    </script>
</body>

</html>
```
