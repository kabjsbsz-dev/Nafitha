<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>الملف الشخصي</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
    <script src="firebase.js"></script>
</head>

<body>
    <header class="topbar">
        <div class="logo">
            <img src="images/logo.png" class="top-logo">
            <span>نافذة</span>
        </div>
        <div class="top-right">
            <button onclick="window.location='home.html'">🏠</button>
        </div>
    </header>

    <div class="profile-cover">
        <img id="coverImage" src="images/cover.jpg" class="cover-img">
        <button class="cover-edit" onclick="changeCover()">📷</button>
    </div>

    <div class="profile-header">
        <img id="profileImage" src="images/logo.png" class="profile-img">
        <button class="profile-edit" onclick="document.getElementById('profileUpload').click()">📷</button>
        <input type="file" id="profileUpload" accept="image/*" style="display:none;">
        <h2 id="userName">...</h2>
        <p id="userBio" style="color:#888;font-size:14px;">مرحباً! أنا على نافذة</p>
        <p id="userCity" style="color:#888;font-size:14px;">📍 ...</p>

        <div class="profile-stats">
            <div>
                <b id="postsCount">0</b>
                <span>منشور</span>
            </div>
            <div onclick="showFollowers()" style="cursor:pointer;">
                <b id="followersCount">0</b>
                <span>متابع</span>
            </div>
            <div onclick="showFollowing()" style="cursor:pointer;">
                <b id="followingCount">0</b>
                <span>يتابع</span>
            </div>
        </div>

        <div class="profile-buttons">
            <button id="followBtn" onclick="toggleFollow()" style="display:none;">➕ متابعة</button>
            <button onclick="editProfile()">✏️ تعديل الملف</button>
            <button onclick="window.location='home.html'">🏠 الرئيسية</button>
            <button onclick="logout()" style="background:#d32f2f;color:#fff;">🚪 تسجيل خروج</button>
        </div>
    </div>

    <div class="profile-tabs">
        <button class="tab active" onclick="switchTab('posts')">المنشورات</button>
        <button class="tab" onclick="switchTab('photos')">الصور</button>
        <button class="tab" onclick="switchTab('favorites')">المفضلة</button>
    </div>

    <div id="userPosts"></div>

    <script src="profile.js"></script>
</body>

</html>
