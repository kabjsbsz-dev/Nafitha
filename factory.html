<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المعامل</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">🏭 المعامل</div>

<input type="text" id="searchFactory" placeholder="ابحث عن معمل..." onkeyup="searchFactory()">

<button class="login" onclick="window.location='index.html'">
🏠 الرئيسية
</button>

</header>

<main id="factoryList" style="padding:20px;">

</main>

<script>

function loadFactories(){

let settings=JSON.parse(localStorage.getItem("factorySettings"));

let html="";

if(settings){

html+=`

<div class="post">

<div class="post-body" style="text-align:center;">

<img src="${settings.logo||'https://via.placeholder.com/120'}"

style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #1877f2;">

<h2>${settings.factory}</h2>

<p>👤 ${settings.owner}</p>

<p>📍 ${settings.city}</p>

<p>📞 ${settings.phone}</p>

<p>⭐⭐⭐⭐⭐</p>

<button class="addPost"

onclick="window.location='profile.html'">

فتح صفحة المعمل

</button>

</div>

</div>

`;

}

document.getElementById("factoryList").innerHTML=html;

}

function searchFactory(){

let value=document.getElementById("searchFactory").value.toLowerCase();

let cards=document.querySelectorAll(".post");

cards.forEach(function(card){

card.style.display=

card.innerText.toLowerCase().includes(value)

?

"block"

:

"none";

});

}

window.onload=loadFactories;

</script>

</body>

</html>
