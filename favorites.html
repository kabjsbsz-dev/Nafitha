<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المفضلة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
</head>

<body>
    <header class="topbar">
        <div class="logo">⭐ المفضلة</div>
        <button onclick="window.location='home.html'" style="color:#FFD700;font-size:24px;">🏠</button>
    </header>

    <div id="favoritesList" style="padding:20px;">
        <p style="text-align:center;color:#888;padding:40px;">جاري التحميل...</p>
    </div>

    <script>
        auth.onAuthStateChanged(function(user) {
            if (!user) {
                window.location = "login.html";
                return;
            }

            db.collection("users").doc(user.uid).get().then(function(doc) {
                let userData = doc.data() || {};
                let favs = userData.favoritesList || [];

                if (favs.length === 0) {
                    document.getElementById("favoritesList").innerHTML =
                        `<div class="post"><div class="post-body"><p style="text-align:center;color:#888;padding:30px;">📭 لا توجد مفضلات</p></div></div>`;
                    return;
                }

                let html = "";
                let count = 0;

                favs.forEach(function(postId) {
                    db.collection("posts").doc(postId).get().then(function(postDoc) {
                        if (postDoc.exists) {
                            let p = postDoc.data();
                            html += `
                            <div class="post">
                                ${p.image ? `<img src="${p.image}" class="post-image" onclick="openImage('${p.image}')">` : ''}
                                <div class="post-body">
                                    ${p.factory ? `<div class="post-title">🏭 ${p.factory}</div>` : ''}
                                    ${p.product ? `<div class="post-product">📦 ${p.product}</div>` : ''}
                                    ${p.description ? `<div class="post-description">${p.description}</div>` : ''}
                                    ${p.price ? `<div class="post-price">💰 ${p.price} د.ع</div>` : ''}
                                </div>
                            </div>
                            `;
                        }
                        count++;
                        if (count === favs.length) {
                            document.getElementById("favoritesList").innerHTML = html || 
                                `<div class="post"><div class="post-body"><p style="text-align:center;color:#888;padding:30px;">لا توجد مفضلات</p></div></div>`;
                        }
                    });
                });
            });
        });

        function openImage(src) {
            let viewer = document.createElement("div");
            viewer.className = "image-viewer";
            viewer.innerHTML = `
                <span class="close-viewer" onclick="this.parentElement.remove()">&times;</span>
                <img src="${src}" class="viewer-img">
                <a href="${src}" download class="download-btn">📥 تحميل الصورة</a>
            `;
            document.body.appendChild(viewer);
            viewer.onclick = function(e) {
                if (e.target === viewer) viewer.remove();
            };
        }
    </script>
</body>

</html>
