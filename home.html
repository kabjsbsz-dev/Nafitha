<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>نافذة</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
    <script src="firebase.js"></script>
</head>

<body>
    <header class="topbar">
        <div class="logo">
            <img src="images/logo.png" class="top-logo">
            <span>نافذة</span>
        </div>
        <div class="top-right">
    <button onclick="window.location='notifications.html'">🔔</button>
    <button onclick="window.location='profile.html'">👤</button>
</div>
    </header>

    <div class="search-box">
        <input type="text" id="search" placeholder="ابحث عن معمل، منتج، مدينة، أو مستخدم...">
    </div>

    <div class="categories">
        <button onclick="filterByCategory('أبواب')">🚪 أبواب</button>
        <button onclick="filterByCategory('شبابيك')">🪟 شبابيك</button>
        <button onclick="filterByCategory('واجهات')">🏢 واجهات</button>
        <button onclick="filterByCategory('مطابخ')">🍽 مطابخ</button>
        <button onclick="filterByCategory('كلادينك')">🧱 كلادينك</button>
        <button onclick="filterByCategory('سلالم')">🪜 سلالم</button>
        <button onclick="filterByCategory('')" style="background:#FFD700;">🗑️ إلغاء التصنيف</button>
    </div>

    <div class="new-post">
        <button onclick="showForm()">➕ إضافة منشور جديد</button>
    </div>

    <div id="usersResults"></div>

    <div id="posts"></div>
        <div class="popup" id="popup">
        <div class="facebook-post">
            <div class="post-top">
                <button class="close-post" onclick="closeForm()">✕</button>
                <h2>منشور جديد</h2>
                <button class="publish-btn" onclick="addPost()">نشر</button>
            </div>

            <div class="post-user">
                <img id="publishProfileImage" src="images/logo.png" class="publish-avatar">
                <div class="publish-user-info">
                    <h3 id="publishUserName">جاري التحميل...</h3>
                    <p>منشور عام 🌍</p>
                </div>
            </div>

            <textarea id="description" class="publish-text" placeholder="بماذا تفكر؟ أو اكتب تفاصيل المنتج..."></textarea>

            <div style="padding:0 20px 10px;">
                <select id="postCategory" style="width:100%;padding:12px;border:1px solid #444;border-radius:10px;background:#2a2a2a;color:#fff;">
                    <option value="">-- اختر التصنيف (اختياري) --</option>
                    <option value="أبواب">🚪 أبواب</option>
                    <option value="شبابيك">🪟 شبابيك</option>
                    <option value="واجهات">🏢 واجهات</option>
                    <option value="مطابخ">🍽 مطابخ</option>
                    <option value="كلادينك">🧱 كلادينك</option>
                    <option value="سلالم">🪜 سلالم</option>
                    <option value="أخرى">📦 أخرى</option>
                </select>
            </div>

            <div id="productFields" style="display:none;padding:0 20px;">
                <input id="product" placeholder="اسم المنتج" style="width:100%;padding:12px;border:1px solid #444;border-radius:10px;background:#2a2a2a;color:#fff;margin-bottom:8px;">
                <input id="price" placeholder="السعر (دينار)" style="width:100%;padding:12px;border:1px solid #444;border-radius:10px;background:#2a2a2a;color:#fff;margin-bottom:8px;">
            </div>

            <input type="file" id="image" accept="image/*" style="display:none;">

            <div class="publish-tools">
                <button onclick="document.getElementById('image').click()">🖼️ صورة</button>
                <button onclick="toggleProductFields()">🏷️ إضافة منتج</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
      <button onclick="window.location='messages.html'">💬</button>
    <button onclick="window.location='home.html'">🏠</button>
    <button onclick="showForm()">➕</button>
    <button onclick="window.location='notifications.html'">🔔</button>
    <button onclick="window.location='profile.html'">👤</button>
</nav>

    <script src="app.js"></script>
    
    <style>
    /* أنيميشن للبطاقات عند التحميل */
    .post {
        animation: fadeInUp 0.6s ease-out forwards;
        opacity: 0;
    }
    .post:nth-child(1) { animation-delay: 0.1s; }
    .post:nth-child(2) { animation-delay: 0.2s; }
    .post:nth-child(3) { animation-delay: 0.3s; }
    .post:nth-child(4) { animation-delay: 0.4s; }
    .post:nth-child(5) { animation-delay: 0.5s; }
</style>

</body>

</html>
