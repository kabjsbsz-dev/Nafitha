<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>طلبات الحجز</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">📅 الحجوزات</div>

<button class="login" onclick="window.location='index.html'">
🏠 الرئيسية
</button>

</header>

<div class="container">

<main style="width:100%;">

<div class="post">

<div class="post-body">

<h2>إرسال طلب</h2>

<input type="text" id="name" placeholder="اسم الزبون">

<input type="text" id="phone" placeholder="رقم الهاتف">

<textarea id="details" placeholder="اكتب تفاصيل الطلب" style="width:100%;height:120px;"></textarea>

<button onclick="sendBooking()">

إرسال الطلب

</button>

</div>

</div>

<div id="bookingList"></div>

</main>

</div>

<script>

function loadBookings(){

let bookings=JSON.parse(localStorage.getItem("bookings"))||[];

let html="";

bookings.forEach(function(item){

html+=`

<div class="post">

<div class="post-body">

<h3>${item.name}</h3>

<p>📞 ${item.phone}</p>

<p>${item.details}</p>

</div>

</div>

`;

});

document.getElementById("bookingList").innerHTML=html;

}

function sendBooking(){

let name=document.getElementById("name").value;

let phone=document.getElementById("phone").value;

let details=document.getElementById("details").value;

if(name==""||phone==""||details==""){

alert("املأ جميع الحقول");

return;

}

let bookings=JSON.parse(localStorage.getItem("bookings"))||[];

bookings.unshift({

name:name,

phone:phone,

details:details

});

localStorage.setItem("bookings",JSON.stringify(bookings));

document.getElementById("name").value="";

document.getElementById("phone").value="";

document.getElementById("details").value="";

loadBookings();

}

window.onload=loadBookings;

</script>

</body>

</html>
